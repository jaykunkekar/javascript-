<body>

<script>
let a = Number(prompt("Enter first number"));
let b = Number(prompt("Enter second number"));

let temp = a;
a = b;
b = temp;

alert("After Swapping");
alert("First Number = " + a);
alert("Second Number = " + b);
</script>

</body>
